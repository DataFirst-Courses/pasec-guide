bookdown::gitbook:
  css: style.css
  download: ["pdf", "epub"]
  includes:
    before_body: home-link.html
  config:
    toc:
      before: |
        <li class="toc-logo"><a href="index.html"><img src="files/AFLEARN logo.png" alt="AFLEARN"></a></li>
        <li class="home-link"><a href="index.html"><i class="fa fa-home"></i> Guide home</a></li>
      after: |
        <li><a href="https://github.com/rstudio/bookdown" target="blank">Published with bookdown</a></li>

bookdown::pdf_book:
  includes:
    in_header: preamble.tex   # optional, for custom LaTeX
  latex_engine: xelatex
  keep_tex: false
  
bookdown::epub_book: default